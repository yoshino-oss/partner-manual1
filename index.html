<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTN事業 操作マニュアル</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0f2540;
  --navy2: #1a3a5c;
  --navy3: #2d5f8a;
  --gold: #c8820a;
  --gold2: #e9a820;
  --gold-pale: #fef5e4;
  --white: #ffffff;
  --bg: #f5f4f1;
  --border: #e2dfd8;
  --text: #1a1a1a;
  --text2: #555;
  --text3: #888;
  --danger: #c0392b;
  --danger-pale: #fdf0ef;
  --success: #1a7a4a;
  --success-pale: #edf7f2;
  --sidebar-w: 240px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.7;
}

/* ===== LAYOUT ===== */
.layout { display: flex; min-height: 100vh; }

/* ===== SIDEBAR ===== */
.sidebar {
  width: var(--sidebar-w);
  background: var(--navy);
  position: fixed;
  top: 0; left: 0; bottom: 0;
  overflow-y: auto;
  z-index: 100;
  display: flex;
  flex-direction: column;
}

.sidebar-logo {
  padding: 24px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.sidebar-logo-label {
  font-size: 10px;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.45);
  margin-bottom: 6px;
}
.sidebar-logo-title {
  font-size: 15px;
  font-weight: 700;
  color: white;
  line-height: 1.4;
}
.sidebar-logo-sub {
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  margin-top: 4px;
}

.sidebar-section {
  padding: 14px 20px 8px;
  font-size: 10px;
  letter-spacing: 0.15em;
  color: rgba(255,255,255,0.35);
  font-weight: 700;
}

.sidebar-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  cursor: pointer;
  border: none;
  background: none;
  color: rgba(255,255,255,0.65);
  font-family: inherit;
  font-size: 13px;
  text-align: left;
  width: 100%;
  border-radius: 0;
  transition: all 0.15s;
  position: relative;
}
.sidebar-btn:hover {
  background: rgba(255,255,255,0.06);
  color: white;
}
.sidebar-btn.active {
  background: rgba(200,130,10,0.18);
  color: var(--gold2);
  font-weight: 700;
}
.sidebar-btn.active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--gold2);
  border-radius: 0 2px 2px 0;
}
.sidebar-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
.sidebar-count {
  margin-left: auto;
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.5);
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 10px;
}
.sidebar-btn.active .sidebar-count {
  background: rgba(200,130,10,0.3);
  color: var(--gold2);
}

.sidebar-footer {
  margin-top: auto;
  padding: 16px 20px;
  border-top: 1px solid rgba(255,255,255,0.08);
  font-size: 11px;
  color: rgba(255,255,255,0.3);
}

/* ===== MAIN ===== */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-height: 100vh;
}

/* ===== TOPBAR ===== */
.topbar {
  background: white;
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  position: sticky;
  top: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  gap: 16px;
}
.topbar-title {
  font-size: 20px;
  font-weight: 900;
  color: var(--navy);
  flex-shrink: 0;
}
.topbar-title span { color: var(--gold); }

.search-wrap {
  flex: 1;
  max-width: 420px;
  position: relative;
}
.search-input {
  width: 100%;
  padding: 9px 14px 9px 38px;
  border: 1.5px solid var(--border);
  border-radius: 24px;
  font-family: inherit;
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--navy3); background: white; }
.search-icon {
  position: absolute;
  left: 13px; top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 15px;
}

.topbar-meta {
  margin-left: auto;
  font-size: 12px;
  color: var(--text3);
}
.topbar-count { font-weight: 700; color: var(--navy); }

/* ===== CONTENT ===== */
.content {
  padding: 28px 32px 60px;
  max-width: 860px;
}

/* ===== FILTER TAGS ===== */
.filter-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.filter-label { font-size: 12px; color: var(--text3); flex-shrink: 0; }
.tag {
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: all 0.15s;
  white-space: nowrap;
}
.tag.all { background: var(--navy); color: white; }
.tag.all:not(.active) { background: var(--bg); color: var(--text2); border-color: var(--border); }
.tag.active { border-color: transparent; }

.tag-cat { --c: var(--navy2); }
.tag-cat.active { background: var(--navy2); color: white; }
.tag-cat:not(.active) { background: var(--bg); color: var(--text2); border-color: var(--border); }

/* ===== ACCORDION ITEMS ===== */
.qa-group { margin-bottom: 28px; }
.qa-group-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.qa-group-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.05em;
}
.qa-group-count { font-size: 12px; color: var(--text3); }

.qa-item {
  background: white;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  margin-bottom: 6px;
  overflow: hidden;
  transition: box-shadow 0.2s, border-color 0.2s;
}
.qa-item:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
.qa-item.open { border-color: var(--navy3); }

.qa-q {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
}
.qa-q-icon {
  width: 28px; height: 28px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  font-weight: 900;
  flex-shrink: 0;
  color: var(--navy2);
  background: var(--bg);
  letter-spacing: 0;
}
.qa-item.open .qa-q-icon {
  background: var(--navy2);
  color: white;
}
.qa-q-text {
  flex: 1;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.5;
}
.qa-q-badges { display: flex; gap: 4px; flex-shrink: 0; }
.qa-arrow {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: transform 0.25s, background 0.2s;
  font-size: 11px;
  color: var(--text3);
}
.qa-item.open .qa-arrow {
  transform: rotate(180deg);
  background: var(--navy);
  border-color: var(--navy);
  color: white;
}

.qa-a {
  display: none;
  padding: 0 20px 20px 62px;
  animation: fadeIn 0.2s ease;
}
.qa-item.open .qa-a { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

.qa-a-inner {
  border-top: 1px solid var(--border);
  padding-top: 16px;
  font-size: 13.5px;
  line-height: 1.8;
  color: var(--text2);
}

/* Answer styling */
.qa-a-inner strong { color: var(--text); font-weight: 700; }
.qa-a-inner ol, .qa-a-inner ul { padding-left: 18px; margin: 8px 0; }
.qa-a-inner li { margin-bottom: 4px; }
.qa-a-inner p { margin-bottom: 8px; }

.a-box {
  background: var(--bg);
  border-radius: 8px;
  padding: 14px 16px;
  margin: 10px 0;
  font-size: 13px;
}
.a-box.info { background: #e8f0f8; border-left: 3px solid var(--navy2); }
.a-box.warn { background: var(--gold-pale); border-left: 3px solid var(--gold); }
.a-box.danger { background: var(--danger-pale); border-left: 3px solid var(--danger); }
.a-box.success { background: var(--success-pale); border-left: 3px solid var(--success); }

.a-step {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.a-step:last-child { border-bottom: none; }
.a-step-num {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--navy2);
  color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 2px;
}
.a-step-body { flex: 1; }
.a-step-title { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
.a-step-desc { font-size: 12px; color: var(--text2); }

.a-cred {
  background: #1a1a2e;
  color: #e0e0e0;
  border-radius: 8px;
  padding: 12px 16px;
  font-family: monospace;
  font-size: 12px;
  margin: 10px 0;
}
.a-cred-label { color: #7ec8e3; font-size: 10px; margin-bottom: 6px; letter-spacing: 0.1em; }
.a-cred-row { display: flex; gap: 12px; margin-bottom: 2px; }
.a-cred-k { color: #a8dadc; width: 50px; }
.a-cred-v { color: white; word-break: break-all; }

.a-check { list-style: none; padding: 0; }
.a-check li {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 7px 0; border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.a-check li:last-child { border-bottom: none; }
.a-chkbox {
  width: 16px; height: 16px;
  border: 1.5px solid #ccc;
  border-radius: 3px;
  flex-shrink: 0; margin-top: 3px; background: white;
}

.badge-pill {
  display: inline-flex; align-items: center;
  padding: 2px 9px; border-radius: 20px;
  font-size: 11px; font-weight: 700;
}
.badge-red { background: #fde; color: #c0392b; }
.badge-green { background: #e5f5ed; color: #1a7a4a; }
.badge-gold { background: var(--gold-pale); color: var(--gold); }
.badge-navy { background: #e5ecf4; color: var(--navy2); }

.link-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 6px;
  background: #e8f0f8; color: var(--navy2);
  font-size: 12px; font-weight: 600;
  text-decoration: none;
  margin: 3px 0;
  word-break: break-all;
}

.cat-badge {
  font-size: 11px; font-weight: 700;
  padding: 2px 8px; border-radius: 4px;
  white-space: nowrap;
}

/* Category colors */
.cat-daily { background: #e3f2fd; color: #1565c0; }
.cat-weekly { background: #e8f5e9; color: #2e7d32; }
.cat-ptn { background: #f3e5f5; color: #7b1fa2; }
.cat-nego { background: #fff3e0; color: #e65100; }
.cat-support { background: #e0f2f1; color: #00695c; }
.cat-sheet { background: #fce4ec; color: #ad1457; }
.cat-rules { background: #efebe9; color: #4e342e; }
.cat-form { background: #e8eaf6; color: #283593; }

/* Empty state */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-text { font-size: 15px; }

/* Hidden */
.hidden { display: none !important; }

/* Scrollbar */
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

/* Mobile hamburger */
.hamburger {
  display: none;
  position: fixed;
  top: 14px; left: 14px;
  z-index: 200;
  background: var(--navy);
  color: white;
  border: none;
  border-radius: 8px;
  width: 36px; height: 36px;
  font-size: 18px;
  cursor: pointer;
  align-items: center; justify-content: center;
}

@media (max-width: 720px) {
  .hamburger { display: flex; }
  .sidebar {
    transform: translateX(-100%);
    transition: transform 0.3s;
  }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .topbar { padding: 14px 16px 14px 60px; }
  .content { padding: 20px 16px 60px; }
  .topbar-title { font-size: 16px; }
  .topbar-meta { display: none; }
}
</style>
</head>
<body>

<button class="hamburger" id="ham" onclick="toggleSidebar()">☰</button>

<div class="layout">

<!-- ===== SIDEBAR ===== -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-label">株式会社 Renovate</div>
    <div class="sidebar-logo-title">PTN事業<br>操作マニュアル</div>
    <div class="sidebar-logo-sub">Partner Referral Program</div>
  </div>

  <div class="sidebar-section">カテゴリ</div>
  <button class="sidebar-btn active" data-cat="all" onclick="filterCat('all',this)">
    <span class="sidebar-icon">📋</span>すべて表示
    <span class="sidebar-count" id="cnt-all"></span>
  </button>
  <button class="sidebar-btn" data-cat="daily" onclick="filterCat('daily',this)">
    <span class="sidebar-icon">📅</span>日次業務
    <span class="sidebar-count" id="cnt-daily"></span>
  </button>
  <button class="sidebar-btn" data-cat="weekly" onclick="filterCat('weekly',this)">
    <span class="sidebar-icon">📊</span>週次業務・管理表
    <span class="sidebar-count" id="cnt-weekly"></span>
  </button>
  <button class="sidebar-btn" data-cat="ptn" onclick="filterCat('ptn',this)">
    <span class="sidebar-icon">🤝</span>PTN開拓
    <span class="sidebar-count" id="cnt-ptn"></span>
  </button>
  <button class="sidebar-btn" data-cat="nego" onclick="filterCat('nego',this)">
    <span class="sidebar-icon">🗣</span>商談・情報回収
    <span class="sidebar-count" id="cnt-nego"></span>
  </button>
  <button class="sidebar-btn" data-cat="support" onclick="filterCat('support',this)">
    <span class="sidebar-icon">🚀</span>導入サポート
    <span class="sidebar-count" id="cnt-support"></span>
  </button>
  <button class="sidebar-btn" data-cat="form" onclick="filterCat('form',this)">
    <span class="sidebar-icon">📝</span>フォーマット集
    <span class="sidebar-count" id="cnt-form"></span>
  </button>
  <button class="sidebar-btn" data-cat="rules" onclick="filterCat('rules',this)">
    <span class="sidebar-icon">⚡</span>心得・NG集
    <span class="sidebar-count" id="cnt-rules"></span>
  </button>

  <div class="sidebar-footer">社外秘 — Rev.2025</div>
</aside>

<!-- ===== MAIN ===== -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title">PTN<span>事業</span> マニュアル</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" id="searchInput" placeholder="キーワードで検索…" oninput="doSearch()">
    </div>
    <div class="topbar-meta">全 <span class="topbar-count" id="visibleCount">0</span> 件表示中</div>
  </div>

  <div class="content">
    <div id="qaList"></div>
    <div class="empty hidden" id="emptyState">
      <div class="empty-icon">🔍</div>
      <div class="empty-text">該当する項目が見つかりませんでした</div>
    </div>
  </div>
</div>

</div><!-- /layout -->

<script>
// ===== DATA =====
let QA = [];

// Load data from data.json
fetch('data.json')
  .then(r => r.json())
  .then(data => {
    QA = data.qa;
    countByCat();
    render();
  })
  .catch(() => {
    document.getElementById('qaList').innerHTML = '<p style="padding:20px;color:red;">データの読み込みに失敗しました。</p>';
  });

// ===== RENDER =====
const CAT_META = {
  daily:   { label: '日次業務',        css: 'cat-daily',   emoji: '📅' },
  weekly:  { label: '週次業務・管理表', css: 'cat-weekly',  emoji: '📊' },
  ptn:     { label: 'PTN開拓',          css: 'cat-ptn',     emoji: '🤝' },
  nego:    { label: '商談・情報回収',    css: 'cat-nego',    emoji: '🗣' },
  support: { label: '導入サポート',      css: 'cat-support', emoji: '🚀' },
  form:    { label: 'フォーマット集',    css: 'cat-form',    emoji: '📝' },
  rules:   { label: '心得・NG集',       css: 'cat-rules',   emoji: '⚡' },
};

let currentCat = 'all';
let currentSearch = '';

function getCatMeta(cat) { return CAT_META[cat] || { label: cat, css: '', emoji: '📌' }; }

function countByCat() {
  const counts = { all: QA.length };
  QA.forEach(q => { counts[q.cat] = (counts[q.cat]||0)+1; });
  Object.keys(counts).forEach(c => {
    const el = document.getElementById('cnt-'+c);
    if (el) el.textContent = counts[c];
  });
}

function visibleItems() {
  return QA.filter(item => {
    const catOk = currentCat === 'all' || item.cat === currentCat;
    const kw = currentSearch.trim().toLowerCase();
    const searchOk = !kw || item.q.toLowerCase().includes(kw) || item.a.toLowerCase().includes(kw);
    return catOk && searchOk;
  });
}

function render() {
  const items = visibleItems();
  document.getElementById('visibleCount').textContent = items.length;
  const list = document.getElementById('qaList');
  const empty = document.getElementById('emptyState');

  if (items.length === 0) {
    list.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  // Group by cat
  const groups = {};
  items.forEach(item => {
    if (!groups[item.cat]) groups[item.cat] = [];
    groups[item.cat].push(item);
  });

  const catOrder = ['daily','weekly','ptn','nego','support','form','rules'];
  let html = '';
  const orderedKeys = currentCat === 'all'
    ? catOrder.filter(k => groups[k])
    : Object.keys(groups);

  orderedKeys.forEach(cat => {
    const group = groups[cat];
    if (!group) return;
    const meta = getCatMeta(cat);
    html += `<div class="qa-group" data-cat="${cat}">
      <div class="qa-group-header">
        <span class="qa-group-tag cat-badge ${meta.css}">${meta.emoji} ${meta.label}</span>
        <span class="qa-group-count">${group.length}件</span>
      </div>`;
    group.forEach((item, i) => {
      const id = `qa-${cat}-${i}`;
      html += `<div class="qa-item" id="${id}">
        <div class="qa-q" onclick="toggleItem('${id}')">
          <div class="qa-q-icon">Q</div>
          <div class="qa-q-text">${item.q}</div>
          <div class="qa-arrow">▾</div>
        </div>
        <div class="qa-a">
          <div class="qa-a-inner">${item.a}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  });
  list.innerHTML = html;
}

function toggleItem(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
  // close sidebar on mobile
  if (window.innerWidth <= 720) {
    document.getElementById('sidebar').classList.remove('open');
  }
}

function doSearch() {
  currentSearch = document.getElementById('searchInput').value;
  render();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// Init handled by fetch callback above

</script>
</body>
</html>
